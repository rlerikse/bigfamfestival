# Watch Spec Context - Pull Latest from Central Repository
#
# This workflow pulls the latest aggregated spec context from the central
# spec-kit-context repo to keep this repository's workspace context in sync.
#
# Triggers:
# 1. repository_dispatch - When spec-kit-context notifies us of updates
# 2. schedule - Daily check for updates (fallback)
# 3. workflow_dispatch - Manual trigger
#
# This ensures all repos have visibility into the full workspace specs.

name: Watch Spec Context

on:
  # Triggered by spec-kit-context after aggregation
  repository_dispatch:
    types: [spec-context-updated]
  
  # Fallback: Check daily for updates
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily
  
  # Manual trigger
  workflow_dispatch:

jobs:
  pull-context:
    name: Pull Latest Spec Context
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SPEC_KIT_CONTEXT_TOKEN }}
          fetch-depth: 1
      
      - name: Create Context Directory
        run: mkdir -p .specify/workspace
      
      - name: Download Latest Context from Central Repo
        run: |
          echo "📥 Downloading latest spec context from central repository..."
          
          # Download all-specs.md
          curl -sL \
            -H "Authorization: token ${{ secrets.SPEC_KIT_CONTEXT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/rlerikse/spec-kit-context/contents/context/all-specs.md" \
            -o .specify/workspace/all-specs.md 2>/dev/null || echo "# No specs aggregated yet" > .specify/workspace/all-specs.md
          
          # Download repo-index.json
          curl -sL \
            -H "Authorization: token ${{ secrets.SPEC_KIT_CONTEXT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/rlerikse/spec-kit-context/contents/context/repo-index.json" \
            -o .specify/workspace/repo-index.json 2>/dev/null || echo '{"repos":[],"totalSpecs":0}' > .specify/workspace/repo-index.json
          
          echo "✓ Downloaded context files"
      
      - name: Display Context Summary
        run: |
          echo ""
          echo "📊 Workspace Context Summary:"
          echo "=============================="
          
          if [ -f ".specify/workspace/repo-index.json" ]; then
            TOTAL_REPOS=$(cat .specify/workspace/repo-index.json | grep -o '"name"' | wc -l || echo "0")
            TOTAL_SPECS=$(cat .specify/workspace/repo-index.json | grep -o '"totalSpecs"' | head -1 | grep -o '[0-9]*' || echo "0")
            echo "  Repositories: $TOTAL_REPOS"
            echo "  Total Specs: $TOTAL_SPECS"
          else
            echo "  No context data available"
          fi
          echo ""
      
      - name: Check for Changes
        id: changes
        run: |
          if git diff --quiet .specify/workspace/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No changes to context files"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✓ Context files have been updated"
            git diff --stat .specify/workspace/
          fi
      
      - name: Commit and Push Updates
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name 'rlerikse'
          git config user.email 'rlerikse@users.noreply.github.com'
          git add .specify/workspace/
          git commit -m "chore(context): sync workspace context from spec-kit-context"
          git push
          echo ""
          echo "✅ Workspace context synced successfully!"
      
      - name: Summary
        run: |
          echo ""
          echo "## Spec Context Sync Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ Context updated from central repository" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ Already up to date" >> $GITHUB_STEP_SUMMARY
          fi
