name: Mobile CI

on:
  push:
    branches: [ main, develop, dev ]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [ main, develop, dev ]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'mobile/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --fix

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  build-expo:
    name: Expo Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    # Run on push to main, develop, or dev (not on PRs)
    if: github.event_name == 'push'

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'mobile/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Determine build profile
        id: profile
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "profile=production" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            echo "profile=beta" >> $GITHUB_OUTPUT
          else
            echo "profile=preview" >> $GITHUB_OUTPUT
          fi

      - name: Build Android (${{ steps.profile.outputs.profile }})
        run: eas build --platform android --profile ${{ steps.profile.outputs.profile }} --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # iOS build — uncomment when Apple certificates are configured
      # - name: Build iOS (${{ steps.profile.outputs.profile }})
      #   run: eas build --platform ios --profile ${{ steps.profile.outputs.profile }} --non-interactive
      #   env:
      #     EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
